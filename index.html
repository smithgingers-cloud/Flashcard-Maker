<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=Instrument+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e11;
  --surface: #17171c;
  --surface2: #1f1f27;
  --border: #2a2a36;
  --ink: #e8e6f0;
  --ink-muted: #6b6880;
  --ink-dim: #3d3b4a;
  --accent: #7c6af7;
  --accent-glow: rgba(124,106,247,0.18);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --red: #f87171;
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.25;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

header { margin-bottom: 3rem; }
header h1 {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 2.4rem;
  letter-spacing: -0.03em;
}
header h1 em { font-style: italic; color: var(--accent); }
.subtitle {
  font-family: 'Fira Code', monospace;
  font-size: 0.72rem;
  color: var(--ink-muted);
  margin-top: 0.4rem;
  letter-spacing: 0.05em;
}

.sec-label {
  font-family: 'Fira Code', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  margin-bottom: 0.7rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

textarea {
  width: 100%;
  height: 220px;
  padding: 1.1rem 1.2rem;
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  line-height: 1.7;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea::placeholder { color: var(--ink-dim); }

.format-note {
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  color: var(--ink-muted);
  margin-top: 0.6rem;
  padding: 0.6rem 0.9rem;
  background: var(--surface2);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
  line-height: 1.6;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.6rem 1.3rem;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 20px var(--accent-glow);
}
.btn-primary:hover { background: #6a59e0; }
.btn-green {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(74,222,128,0.25);
}
.btn-green:hover { background: rgba(74,222,128,0.2); }

.btn-row {
  display: flex;
  gap: 0.7rem;
  margin-top: 1.1rem;
}

.status {
  font-family: 'Fira Code', monospace;
  font-size: 0.78rem;
  padding: 0.7rem 1rem;
  border-radius: 6px;
  margin: 1.2rem 0 0;
  line-height: 1.5;
  display: none;
}
.status.error {
  background: rgba(248,113,113,0.1);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.25);
  display: block;
}

.divider { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.4rem;
  gap: 1rem;
  flex-wrap: wrap;
}
.preview-header h2 {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 1.5rem;
  letter-spacing: -0.02em;
}
.card-count-badge {
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 0.25rem 0.65rem;
  border-radius: 20px;
  color: var(--ink-muted);
}

.card-list { display: flex; flex-direction: column; gap: 0.75rem; }

.fc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: grid;
  grid-template-columns: 36px 1fr 1fr;
  transition: border-color 0.15s;
  animation: fadeUp 0.3s ease both;
}
.fc:hover { border-color: var(--accent); }

.fc-num {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fira Code', monospace;
  font-size: 0.65rem;
  color: var(--ink-dim);
  background: var(--surface2);
  border-right: 1px solid var(--border);
}

.fc-front, .fc-back {
  padding: 0.85rem 1rem;
  font-size: 0.9rem;
  line-height: 1.5;
}
.fc-front {
  border-right: 1px solid var(--border);
  font-weight: 500;
}
.fc-back { color: #b0adc4; }

.fc-header { cursor: default; }
.fc-header:hover { border-color: var(--border); }
.fc-header .fc-front,
.fc-header .fc-back {
  font-family: 'Fira Code', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  font-weight: 400;
  padding: 0.5rem 1rem;
}

.export-row {
  display: flex;
  gap: 0.7rem;
  margin-top: 1.5rem;
  align-items: center;
  flex-wrap: wrap;
}
.export-note {
  font-family: 'Fira Code', monospace;
  font-size: 0.68rem;
  color: var(--ink-muted);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Flash<em>cards</em></h1>
    <p class="subtitle">// paste → preview → export to anki</p>
  </header>

  <div class="sec-label">your text</div>
  <textarea id="source" placeholder="Front side&#10;&#10;Back side&#10;&#10;Next front&#10;&#10;Next back"></textarea>
  <p class="format-note">
    Blank line = separator between front and back &nbsp;·&nbsp; "/" = line break within a card side
  </p>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="previewCards()">Preview Cards</button>
  </div>

  <div id="status" class="status"></div>

  <div id="preview-section" style="display:none">
    <hr class="divider">
    <div class="preview-header">
      <h2>Preview</h2>
      <span class="card-count-badge" id="count-badge">0 cards</span>
    </div>

    <div class="card-list" id="card-list"></div>

    <div class="export-row">
      <button class="btn btn-green" onclick="exportAnki()">&#8595; Export for Anki (.txt)</button>
      <span class="export-note">Tab-separated &middot; File &rarr; Import in Anki</span>
    </div>
  </div>

</div>
<script>
var cards = [];

function capitalizeFirst(str) {
  var t = str.trimStart();
  if (!t) return str;
  var leading = str.slice(0, str.length - t.length);
  return leading + t.charAt(0).toUpperCase() + t.slice(1);
}

function polishText(text) {
  // "/" becomes a line break; capitalize first letter of each resulting part
  if (text.indexOf('/') !== -1) {
    return text.split('/').map(function(part) {
      return capitalizeFirst(part.trim());
    }).join('\n');
  }
  return capitalizeFirst(text.trim());
}

function parseAndPolish(raw) {
  // Split into chunks on blank lines
  var chunks = raw.split(/\n\s*\n/).map(function(c) { return c.trim(); }).filter(function(c) { return c.length > 0; });
  var pairs = [];
  for (var i = 0; i + 1 < chunks.length; i += 2) {
    pairs.push({
      front: polishText(chunks[i]),
      back:  polishText(chunks[i + 1])
    });
  }
  return pairs;
}

function previewCards() {
  var raw = document.getElementById('source').value;
  var pairs = parseAndPolish(raw);

  if (pairs.length === 0) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').textContent = 'No card pairs found. Make sure fronts and backs are separated by a blank line.';
    return;
  }

  document.getElementById('status').className = 'status';
  cards = pairs;
  renderPreview();
}

function renderPreview() {
  var list = document.getElementById('card-list');
  list.innerHTML = '';

  var header = document.createElement('div');
  header.className = 'fc fc-header';
  header.innerHTML = '<div class="fc-num"></div><div class="fc-front">Front</div><div class="fc-back">Back</div>';
  list.appendChild(header);

  cards.forEach(function(c, i) {
    var el = document.createElement('div');
    el.className = 'fc';
    el.style.animationDelay = (i * 0.04) + 's';
    el.innerHTML =
      '<div class="fc-num">' + (i + 1) + '</div>' +
      '<div class="fc-front">' + fmt(c.front) + '</div>' +
      '<div class="fc-back">'  + fmt(c.back)  + '</div>';
    list.appendChild(el);
  });

  document.getElementById('count-badge').textContent = cards.length + ' card' + (cards.length !== 1 ? 's' : '');
  document.getElementById('preview-section').style.display = 'block';
  document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function exportAnki() {
  // Flatten newlines to " | " so each card stays on one line
  function flatten(s) { return s.replace(/\n/g, ' | ').trim(); }
  var content = cards.map(function(c) {
    return flatten(c.front) + '\t' + flatten(c.back);
  }).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain;charset=utf-8' }));
  a.download = 'flashcards.txt';
  a.click();
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function fmt(s) {
  return esc(s).replace(/\n/g, '<br>');
}
</script>
</body>
</html>
